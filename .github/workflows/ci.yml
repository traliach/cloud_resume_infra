name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  terraform:
    name: Terraform validate + plan
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
      TF_VAR_resume_subdomain: ${{ vars.TF_VAR_RESUME_SUBDOMAIN }}
      TF_VAR_alert_email: ${{ secrets.TF_VAR_ALERT_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infra

      - name: Terraform validate
        run: terraform validate
        working-directory: infra

      - name: Terraform plan
        run: terraform plan -out=tfplan
        working-directory: infra

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tfplan
          path: infra/tfplan

  lambda-tests:
    name: Lambda unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3 pytest

      - name: Run tests
        run: python -m pytest tests/ -v
        working-directory: lambda

  frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v6.0.2

      - name: Checkout frontend (achille.dev)
        uses: actions/checkout@v6.0.2
        with:
          repository: traliach/achille.dev
          path: achille.dev

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install
        working-directory: achille.dev/client

      - name: ESLint
        run: npx eslint src/
        working-directory: achille.dev/client

      - name: Build
        run: npm run build
        working-directory: achille.dev/client
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_VISITOR_COUNTER_URL: ${{ vars.VITE_VISITOR_COUNTER_URL }}
