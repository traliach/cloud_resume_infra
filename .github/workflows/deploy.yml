name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Terraform apply + S3 deploy + cache invalidation
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
      TF_VAR_resume_subdomain: ${{ vars.TF_VAR_RESUME_SUBDOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: infra

      - name: Checkout frontend (achille.dev)
        uses: actions/checkout@v4.2.2
        with:
          repository: traliach/achille.dev
          path: achille.dev

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm install
        working-directory: achille.dev/client

      - name: Build frontend
        run: npm run build
        working-directory: achille.dev/client
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_VISITOR_COUNTER_URL: ${{ vars.VITE_VISITOR_COUNTER_URL }}

      - name: Upload to S3
        run: |
          aws s3 sync achille.dev/client/dist/ s3://${{ vars.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
